steps:
  # Build the multi-stage Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/meeting-assistant:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/meeting-assistant:latest'
      - '.'
 
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meeting-assistant:latest']
 
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meeting-assistant'
      - '--image=gcr.io/$PROJECT_ID/meeting-assistant:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,LOCATION=us-central1'
      - '--service-account=meeting-agent-sa@$PROJECT_ID.iam.gserviceaccount.com'
 
images:
  - 'gcr.io/$PROJECT_ID/meeting-assistant:latest'
