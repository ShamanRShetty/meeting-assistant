steps:
  # Build the multi-stage Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/meeting-assistant/app:latest'
      - '.'

  # Push to Artifact Registry with retry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'          
    args:
      - '-c'
      - |
        for i in 1 2 3; do
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/meeting-assistant/app:latest && break
          echo "Push failed, retrying in 60s..."
          sleep 60
        done

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meeting-assistant'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/meeting-assistant/app:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,LOCATION=us-central1,TOKEN_SECRET=meeting-assistant-token,GOOGLE_OAUTH_CLIENT_ID=333175227712-84916qr6qj98sqcpvvv9v72uk70rtsqg.apps.googleusercontent.com,OAUTH_REDIRECT_URI=https://meeting-assistant-333175227712.us-central1.run.app/api/auth/callback'
      - '--set-secrets=GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest'
      - '--service-account=meeting-agent-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/meeting-assistant/app:latest'  